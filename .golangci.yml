version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*os/exec.Cmd).Run
      - os.RemoveAll
      - os.Remove
      - os.Rename
      - os.MkdirAll
      - os.WriteFile
      - fmt.Sscanf

  revive:
    rules:
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true
      - name: unused-parameter
        disabled: true
      - name: empty-block
        disabled: true

  gocritic:
    disabled-checks:
      - ifElseChain
      - singleCaseSwitch
      - exitAfterDefer

  staticcheck:
    checks:
      - all
      - -QF*  # disable quickfix suggestions

formatters:
  enable:
    - gofmt
